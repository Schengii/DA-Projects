<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js"></script>
    <title>InputTest</title>
</head>
<body>
    <form>
        <label for="amount">Amount:</label>
        <input id="amount" min="0" max="5" type="number" value="0" required>  <!-- "required" steht für unbeding ausfüllen sonst Fehlermeldung-->
        <label for="amount">second Amount:</label>
         <input id="amount" min="0" max="5" type="number" value="0">
        <input type="submit" value="Submit">
    </form>

     <!-- Beispiel für zwei Input Felder mit Vor und Nachnamen -->

      <form>
        <label for="fname">First name:</label><br>
        <input type="text" id="fname" name="fname" value="Vorname"><br>
        <label for="lname">Last name:</label><br>
        <input type="text" id="lname" name="lname" value="Nachname"><br><br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
      </form>
