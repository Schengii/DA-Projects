<!DOCTYPE html>
<html lang="de">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HotDrop - Dein Lieferdienst</title>

    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<body onload="render()">

            <img src="./img/Logo 02.png" alt="BestellAPP Logo" class="logo">
            <i class="fa fa-bars"></i>
        </div>
    </header>

    <div class="main-container">
        <main>
            <section class="hero-section">
                <img src="./img/Header-Bestellapp.jpg" alt="Leckeres Essen" class="hero-image">

                    <img src="./img/Burger Logo Icon.png" alt="Restaurant Logo" class="restaurant-logo">
                </div>
            </section>

            <section class="restaurant-info">
                <h1>Burger House </h1>
                    <div class="rating">
                        <span class="stars">⭐ <b>4,1</b></span>
                        <span class="rating-text">(3172)</span>
                    </div>
                

                <p class="delivery-info">
                    <p><b>The best of Burgers, Pizza, and Greens, all in one greate place.</b></p>
                </p>
            </section>



            <div id="menu-container">
                <h2>Burger und Sandwiches</h2>
            </div>

        </main>

                </div>

            </div>
        </aside>

    <div class="mobile-basket-button-container">
        <button id="mobile-basket-btn" onclick="openMobileBasket()">
            Warenkorb (<span id="mobile-total">0.00 €</span>)
        </button>
    </div>

        <p>&copy; 2026 HotDrop Delivery - Developer Akademie Projekt</p>
