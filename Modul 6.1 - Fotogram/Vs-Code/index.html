<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogram</title>
    
    <link rel="icon" type="image/x-icon" href="./icon/favicon_fotogram.png">

    <script src="script.js"></script>

    <style>
        .single_element {
            color: white;
            font-size: 12px;
            padding: 16px;
            background-color: rgb(40, 39, 42);
        }

        .single_element:hover {
            color: white;
            font-size: 12px;
            padding: 16px;
            background-color: rgb(71, 13, 187);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            height: 100vh;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.375);
        }

        .d_none {
            display: none;
        }
    </style>
</head>

<body onload="renderFiltered(1)">


    <div onclick="toggleOverlay()" id="overlay" class="overlay">

    </div>

    
    <h1>Tipps und Tricks</h1>
    <button onclick="renderFiltered(1)">1</button>
    <button onclick="renderFiltered(2)">2</button>
    <div id="content">

    </div>
    
</body>

</html>
