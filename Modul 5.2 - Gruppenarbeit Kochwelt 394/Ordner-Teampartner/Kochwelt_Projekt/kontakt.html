<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kochwelt</title>
    <link rel="stylesheet" href="./style.css" type="text/css">
    <link rel="stylesheet" href="./fonts.css">
    <link rel="icon" href="./img/favicon.svg" sizes="any" type="image/svg+xml">
</head>

<body class="kontakt_body">
    <nav>
        <div class="logo margin_left">
            <div class="logo"> <a href="index.html"><img class="logo-size" src="./img/logo.png" alt="logo"></a></div>
        </div>


        <div class="header_links margin_right">

            <a id="start" class="header_links_solo" href="index.html">Start</a>
            <a id="rezept_des_tages" class="header_links_solo" href="kaiserschmarrn.html">Rezept des Tages</a>
            <a id="kontakt" class="header_links_solo" href="kontakt.html">Kontakt</a>
            <a id="impressum" class="header_links_solo" href="impressum.html">Impressum</a>

        </div>
    </nav>

    <div class="class_kontaktiere_uns">
        <form action="" class="form_kontaktiere_uns">
            <h2 class="kontaktiereUnsH2">Kontaktiere uns</h2>
            <label class="kontaktiereUnsLabel">dein Name:</label>
            <input class="form_kontaktiere_uns_zeilen" type="text" required>
            <label class="kontaktiereUnsLabel">deine E-Mail:</label>
            <input class="form_kontaktiere_uns_zeilen" type="email" required>
            <label class="kontaktiereUnsLabel">Deine Nachricht:</label>
            <textarea class="form_kontaktiere_uns_zeilen" name="" id="" rows="10" cols="15" required
                maxlength="200"></textarea>
            <div class="button_kontakt_form_class">
                <button id="button_kontakt_form" class="button_rezept_open button_kontakt_form">Abschicken</button>
            </div>

        </form>
    </div>



    <div class="grau_only unten_fixed unten_fixed_box">

        <div class="logo margin_left">
            <img class="logo-size logo_footer" src="./img/logo.png" alt="logo">
        </div>

        <div class="social_links margin_right">

            <div class="sozial_links_123">
                <div class="sozial_links_123_core"><img src="./img/facebook_logo.svg" alt=""></div>
                <div class="sozial_links_123_core"><a href="https://de-de.facebook.com/">find us on<br>FACEBOOK</a>
                </div>

            </div>
            <div class="sozial_links_123">
                <div class="sozial_links_123_core"><img src="./img/instagram_logo.svg" alt=""></div>
                <div class="sozial_links_123_core"><a href="https://www.instagram.com/developer.akademie/?hl=de">follow
                        us on<br>INSTAGRAM</a></div>

            </div>
            <div class="sozial_links_123">
                <div class="sozial_links_123_core"><img src="./img/Logo_of_Twitter_(white).svg" alt=""></div>
                <div class="sozial_links_123_core"><a href="https://x.com/?lang=de">follow us on<br>TWITTER</a></div>

            </div>
        </div>

    </div>
    <script src="./script.js"></script>
</body>

</html>
